services:
  backend:
    image: ghcr.io/silverthunder09/jdsnack-backend:${JDSNACK_IMAGE_TAG:-latest}
    container_name: jdsnack-backend
    env_file:
      - path: .env
        required: false
    environment:
      JDSNACK_DIAGNOSIS_MODE: ${JDSNACK_DIAGNOSIS_MODE:-ai-local}
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/silverthunder09/jdsnack-frontend:${JDSNACK_IMAGE_TAG:-latest}
    container_name: jdsnack-frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
