services:
  backend:
    build:
      context: ./backend
    container_name: jdsnack-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: jdsnack-frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
