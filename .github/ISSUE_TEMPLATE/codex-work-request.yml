name: Codex Work Request
description: 기존 기능 버그 또는 자동 Spec 승격이 가능한 제품 요구사항
title: "[Bug] "
labels:
  - codex-auto
body:
  - type: dropdown
    id: type
    attributes:
      label: Work type
      description: 제목에도 [Bug] 또는 [Feature]를 남겨 자동 분류가 실패하지 않게 합니다.
      options:
        - Bug
        - Feature
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or requirement
      description: 재현 절차, 기대 동작, 제품 요구사항을 구체적으로 적습니다.
    validations:
      required: true
  - type: input
    id: product-signal
    attributes:
      label: Product signal label
      description: 백로그 시작조건을 해제할 때만 product-signal:* 라벨을 추가합니다.
      placeholder: "product-signal:analysis-history"
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance notes
      description: 사용자가 확인할 완료 조건을 적습니다.
    validations:
      required: true
