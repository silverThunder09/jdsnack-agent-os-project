name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-ci:
    name: Test and build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Setup Node
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: npm ci

      - name: Lint
        if: steps.changes.outputs.frontend == 'true'
        run: npm run lint

      - name: Test
        if: steps.changes.outputs.frontend == 'true'
        run: npm run test

      - name: Build
        if: steps.changes.outputs.frontend == 'true'
        run: npm run build

      - name: Skip notice
        if: steps.changes.outputs.frontend != 'true'
        run: echo "frontend/ 변경 없음 → 프론트 lint/test/build 건너뜀."
