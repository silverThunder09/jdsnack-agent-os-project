name: Container Flow

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'compose.local.yaml'
      - 'compose.prod.yaml'
      - 'scripts/smoke-test.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-container:
    name: Build backend container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          load: true
          tags: jdsnack-backend:ci

      - name: Run container
        run: |
          docker run --rm -d \
            --name jdsnack-backend-ci \
            -p 8080:8080 \
            jdsnack-backend:ci

      - name: Check health endpoint
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if curl -fsS http://localhost:8080/api/health | tee /tmp/health.json; then
              grep -q '"success":true' /tmp/health.json
              grep -q '"status":"UP"' /tmp/health.json
              grep -q '"service":"JDSnack"' /tmp/health.json
              grep -q '"version":"1.0.0"' /tmp/health.json
              exit 0
            fi

            echo "Waiting for backend container health check... ${attempt}/30"
            sleep 2
          done

          docker logs jdsnack-backend-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker stop jdsnack-backend-ci || true

  compose-smoke:
    name: Run compose smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start compose stack
        env:
          JDSNACK_DIAGNOSIS_MODE: fixture
        run: docker compose -f compose.local.yaml up --build -d

      - name: Run smoke test
        run: bash ./scripts/smoke-test.sh

      - name: Print compose logs
        if: failure()
        run: docker compose -f compose.local.yaml logs --no-color

      - name: Stop compose stack
        if: always()
        run: docker compose -f compose.local.yaml down -v

  publish-images:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs:
      - backend-container
      - compose-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/silverthunder09/jdsnack-backend:latest
            ghcr.io/silverthunder09/jdsnack-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/silverthunder09/jdsnack-frontend:latest
            ghcr.io/silverthunder09/jdsnack-frontend:${{ github.sha }}

      - name: Verify prod compose can pull pushed images
        env:
          JDSNACK_IMAGE_TAG: ${{ github.sha }}
        run: docker compose -f compose.prod.yaml pull
