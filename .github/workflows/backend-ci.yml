name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-ci:
    name: Test and build backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'

      - name: Setup Java
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        if: steps.changes.outputs.backend == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Test
        if: steps.changes.outputs.backend == 'true'
        run: gradle test

      - name: Build boot jar
        if: steps.changes.outputs.backend == 'true'
        run: gradle bootJar

      - name: Skip notice
        if: steps.changes.outputs.backend != 'true'
        run: echo "backend/ 변경 없음 → 백엔드 테스트/빌드 건너뜀."
