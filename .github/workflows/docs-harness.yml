name: Docs Harness

on:
  push:
    branches:
      - main
    paths:
      - '.agent-os/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'evals/**'
      - 'scripts/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'config.yml'
      - 'backends.json'
      - 'backend/README.md'
      - 'frontend/README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-harness:
    name: Validate Agent OS docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run docs harness
        shell: bash
        run: bash scripts/docs-harness.sh
