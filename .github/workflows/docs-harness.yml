name: Docs Harness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-harness:
    name: Validate Agent OS docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required spec markers
        shell: bash
        run: |
          set -euo pipefail

          specs="$(awk '/^active_specs:/ { active=1; next } /^[^[:space:]]/ { active=0 } active && /^[[:space:]]+- / { sub(/^[[:space:]]*- /, ""); print }' .agent-os/standards/index.yml)"
          active_count="$(printf '%s\n' "$specs" | sed '/^$/d' | wc -l | tr -d ' ')"

          test "$active_count" -le 1 || {
            echo "At most one active spec is allowed; found $active_count"
            exit 1
          }
          test -f .agent-os/product/spec-backlog.md

          for spec in $specs; do
            test -f "$spec/requirements.md"
            test -f "$spec/acceptance-criteria.md"
            test -f "$spec/test-scenarios.md"
            test -f "$spec/traceability.md"
            test -f "$spec/api-spec.md"
            test -f "$spec/plan.md"

            grep -Eq 'REQ-[0-9]{2}' "$spec/requirements.md"
            grep -Eq 'AC-[0-9]{2}' "$spec/acceptance-criteria.md"
            grep -Eq 'TC-[0-9]{2}' "$spec/test-scenarios.md"
            grep -Eq 'REQ-[0-9]{2}.*AC-[0-9]{2}.*TC-[0-9]{2}' "$spec/traceability.md"
          done

      - name: Check traceability completeness
        shell: bash
        run: |
          set -euo pipefail

          specs="$(awk '/^active_specs:/ { active=1; next } /^[^[:space:]]/ { active=0 } active && /^[[:space:]]+- / { sub(/^[[:space:]]*- /, ""); print }' .agent-os/standards/index.yml)"

          for spec in $specs; do
            reqs="$(mktemp)"
            acs="$(mktemp)"
            tcs="$(mktemp)"
            mapped_reqs="$(mktemp)"
            mapped_acs="$(mktemp)"
            mapped_tcs="$(mktemp)"

            grep -oE 'REQ-[0-9]{2}' "$spec/requirements.md" | sort -u > "$reqs"
            grep -oE 'AC-[0-9]{2}' "$spec/acceptance-criteria.md" | sort -u > "$acs"
            grep -oE 'TC-[0-9]{2}' "$spec/test-scenarios.md" | sort -u > "$tcs"
            grep -oE 'REQ-[0-9]{2}' "$spec/traceability.md" | sort -u > "$mapped_reqs"
            grep -oE 'AC-[0-9]{2}' "$spec/traceability.md" | sort -u > "$mapped_acs"
            grep -oE 'TC-[0-9]{2}' "$spec/traceability.md" | sort -u > "$mapped_tcs"

            diff -u "$reqs" "$mapped_reqs"
            diff -u "$acs" "$mapped_acs"
            diff -u "$tcs" "$mapped_tcs"

            awk -F'|' '/REQ-[0-9]{2}/ {
              req = $2
              ac = $3
              tc = $4
              doc = $5

              gsub(/[`[:space:]]/, "", req)
              gsub(/[`[:space:]]/, "", ac)
              gsub(/[`[:space:]]/, "", tc)
              gsub(/[`[:space:]]/, "", doc)

              if (req !~ /REQ-[0-9]{2}/ || ac !~ /AC-[0-9]{2}/ || tc !~ /TC-[0-9]{2}/ || doc !~ /.md$/) {
                print "Invalid traceability row: " $0
                exit 1
              }
            }' "$spec/traceability.md"
          done

      - name: Check standards index paths
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r path; do
            test -e "$path" || {
              echo "Missing indexed document: $path"
              exit 1
            }
          done < <(grep -E '^[[:space:]]+- ' .agent-os/standards/index.yml | sed 's/^[[:space:]]*- //')

      - name: Block legacy MVP references
        shell: bash
        run: |
          set -euo pipefail

          legacy_pattern='gemini-api-key|API Key 설정|API Key 입력|GeminiService|AI_SERVICE_ERROR|INVALID_API_KEY|tests\.md|testing\.md|jdsnack-agent-os-main\.zip'

          if grep -R --exclude-dir=node_modules --exclude-dir=build --exclude-dir=.gradle -n -E "$legacy_pattern" AGENTS.md README.md config.yml .agent-os docs backend frontend; then
            echo "Legacy MVP reference found. Keep phase 1 no-key docs clean."
            exit 1
          fi
