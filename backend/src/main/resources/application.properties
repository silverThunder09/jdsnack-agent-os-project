jdsnack.diagnosis.mode=stub
jdsnack.auth.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
jdsnack.auth.google.token-uri=https://oauth2.googleapis.com/token
jdsnack.auth.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
jdsnack.auth.google.client-id=${GOOGLE_CLIENT_ID:}
jdsnack.auth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
jdsnack.auth.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
jdsnack.auth.google.frontend-success-redirect-uri=${GOOGLE_FRONTEND_SUCCESS_REDIRECT_URI:http://localhost:5173/}
jdsnack.auth.google.frontend-failure-redirect-uri=${GOOGLE_FRONTEND_FAILURE_REDIRECT_URI:http://localhost:5173/}
jdsnack.auth.google.scopes=openid,email,profile
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
spring.datasource.url=jdbc:h2:mem:jdsnack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
